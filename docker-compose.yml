services:
  mysql:
    image: mysql:8.0
    container_name: social-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=social_media
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - social-network

  redis:
    image: redis:7-alpine
    container_name: social-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - social-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: social-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - social-network

  kafka:
    image: confluentinc/confluent-local:7.6.0
    container_name: social-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
    networks:
      - social-network

volumes:
  mysql-data:
  redis-data:
  es-data:
  kafka-data:

networks:
  social-network:
    driver: bridge
